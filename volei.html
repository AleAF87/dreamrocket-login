<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geleia Volei</title>
    <style>
        :root {
            --sky-top: #8fd3ff;
            --sky-bottom: #f7fcff;
            --court: #f4b266;
            --court-shadow: #dd9347;
            --net: #f8f8f8;
            --net-post: #4776b6;
            --jelly-left: #ff6f91;
            --jelly-right: #4ab7a7;
            --ball: #fff7e2;
            --text: #17324d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Trebuchet MS", Arial, sans-serif;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.9), transparent 35%),
                linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
            color: var(--text);
        }

        .game-shell {
            width: min(980px, calc(100vw - 24px));
            padding: 20px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.72);
            box-shadow: 0 24px 60px rgba(23, 50, 77, 0.18);
            backdrop-filter: blur(12px);
        }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .hud h1 {
            margin: 0;
            font-size: clamp(1.5rem, 2vw, 2.2rem);
        }

        .scoreboard {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-weight: 700;
        }

        .badge {
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 10px 30px rgba(23, 50, 77, 0.08);
        }

        .controls {
            margin-top: 14px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 0.95rem;
        }

        .panel {
            padding: 12px 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 10px 30px rgba(23, 50, 77, 0.08);
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 22px;
            background: linear-gradient(180deg, #8fd3ff 0%, #daf3ff 62%, #ffe7bd 62%, #f4b266 100%);
            box-shadow: inset 0 -30px 0 rgba(0, 0, 0, 0.06);
        }

        .hint {
            margin-top: 10px;
            font-size: 0.92rem;
        }

        @media (max-width: 640px) {
            .game-shell {
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <main class="game-shell">
        <div class="hud">
            <h1>Volei das Geleinhas</h1>
            <div class="scoreboard">
                <div class="badge" id="leftScore">Geleia Rosa: 0</div>
                <div class="badge" id="rightScore">Geleia Verde: 0</div>
                <div class="badge" id="status">Saque da Geleia Rosa</div>
            </div>
        </div>

        <canvas id="game" width="920" height="520" aria-label="Jogo de volei entre geleinhas"></canvas>

        <div class="controls">
            <div class="panel">Rosa: <strong>A / D</strong> para mover, <strong>W</strong> para pular</div>
            <div class="panel">Verde: <strong>← / →</strong> para mover, <strong>↑</strong> para pular</div>
            <div class="panel">Se a bola tocar o chão do seu lado, o ponto é do adversário.</div>
        </div>

        <div class="hint">A rede no meio rebate a bola como uma parede, e a bola segue com gravidade em arco.</div>
    </main>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        const leftScoreEl = document.getElementById("leftScore");
        const rightScoreEl = document.getElementById("rightScore");
        const statusEl = document.getElementById("status");

        const world = {
            width: canvas.width,
            height: canvas.height,
            floorY: 450,
            gravity: 0.34,
            net: {
                x: canvas.width / 2,
                y: 260,
                width: 12,
                height: 190
            }
        };

        const controls = {
            KeyA: false,
            KeyD: false,
            KeyW: false,
            ArrowLeft: false,
            ArrowRight: false,
            ArrowUp: false
        };

        const score = {
            left: 0,
            right: 0
        };

        const players = {
            left: createPlayer({
                x: 170,
                color: "#ff6f91",
                side: "left",
                sideMin: 30,
                sideMax: world.net.x - 16
            }),
            right: createPlayer({
                x: world.width - 170,
                color: "#4ab7a7",
                side: "right",
                sideMin: world.net.x + 16,
                sideMax: world.width - 30
            })
        };

        const ball = {
            x: 220,
            y: 170,
            vx: 0,
            vy: 0,
            radius: 16,
            spin: 0
        };

        let server = "left";
        let roundEndedAt = 0;
        let roundOver = false;
        let rallyStarted = false;
        let whistleTimeoutId = null;
        let whistleStartTimeoutId = null;
        let crowdStopTimeoutId = null;
        let crowdFadeIntervalId = null;
        let audioUnlocked = false;
        let pendingReadyWhistle = false;
        let touchState = {
            side: null,
            count: 0
        };
        const whistleAudio = new Audio("audio/apito.mp3");
        const crowdAudio = new Audio("audio/gol-torcida.mp3");
        whistleAudio.preload = "auto";
        crowdAudio.preload = "auto";
        whistleAudio.volume = 1;
        crowdAudio.volume = 1;

        function stopWhistle() {
            if (whistleStartTimeoutId) {
                clearTimeout(whistleStartTimeoutId);
                whistleStartTimeoutId = null;
            }

            if (whistleTimeoutId) {
                clearTimeout(whistleTimeoutId);
                whistleTimeoutId = null;
            }

            whistleAudio.pause();
            whistleAudio.currentTime = 0;
        }

        function stopCrowdCheer() {
            if (crowdStopTimeoutId) {
                clearTimeout(crowdStopTimeoutId);
                crowdStopTimeoutId = null;
            }

            if (crowdFadeIntervalId) {
                clearInterval(crowdFadeIntervalId);
                crowdFadeIntervalId = null;
            }

            crowdAudio.pause();
            crowdAudio.currentTime = 0;
            crowdAudio.volume = 1;
        }

        function unlockAudio() {
            audioUnlocked = true;

            if (pendingReadyWhistle) {
                pendingReadyWhistle = false;
                playReadyWhistle();
            }
        }

        function playReadyWhistle() {
            if (!audioUnlocked) {
                pendingReadyWhistle = true;
                return;
            }

            stopWhistle();
            whistleStartTimeoutId = setTimeout(() => {
                whistleAudio.currentTime = 0;
                whistleAudio.play().catch(() => {});
                whistleTimeoutId = setTimeout(() => {
                    stopWhistle();
                }, 2000);
            }, 180);
        }

        function playCrowdCheer() {
            if (!audioUnlocked) return;

            stopCrowdCheer();
            crowdAudio.currentTime = 0;
            crowdAudio.volume = 1;
            crowdAudio.play().catch(() => {});

            crowdStopTimeoutId = setTimeout(() => {
                const fadeDuration = 1000;
                const fadeStepMs = 50;
                const totalSteps = fadeDuration / fadeStepMs;
                let currentStep = 0;

                crowdFadeIntervalId = setInterval(() => {
                    currentStep += 1;
                    crowdAudio.volume = Math.max(0, 1 - currentStep / totalSteps);

                    if (currentStep >= totalSteps) {
                        stopCrowdCheer();
                    }
                }, fadeStepMs);
            }, 2000);
        }

        function createPlayer({ x, color, side, sideMin, sideMax }) {
            return {
                x,
                y: world.floorY,
                vx: 0,
                vy: 0,
                radius: 42,
                squash: 1,
                color,
                side,
                sideMin,
                sideMax,
                jumpStrength: 11.2,
                speed: 0.62,
                maxSpeed: 5.6,
                onGround: true
            };
        }

        function positionPlayers() {
            players.left.x = 170;
            players.left.y = world.floorY;
            players.left.vx = 0;
            players.left.vy = 0;
            players.left.onGround = true;
            players.left.squash = 1;

            players.right.x = world.width - 170;
            players.right.y = world.floorY;
            players.right.vx = 0;
            players.right.vy = 0;
            players.right.onGround = true;
            players.right.squash = 1;
        }

        function positionBall(nextServer) {
            if (nextServer === "left") {
                ball.x = 240;
                ball.y = 290;
            } else {
                ball.x = world.width - 240;
                ball.y = 290;
            }

            ball.vx = 0;
            ball.vy = 0;
            ball.spin = 0;
        }

        function resetRally(nextServer) {
            server = nextServer;
            roundEndedAt = performance.now();
            roundOver = false;
            rallyStarted = false;
            touchState.side = null;
            touchState.count = 0;

            positionPlayers();
            positionBall(nextServer);

            updateHud();
            playReadyWhistle();
        }

        function updateHud() {
            leftScoreEl.textContent = `Geleia Rosa: ${score.left}`;
            rightScoreEl.textContent = `Geleia Verde: ${score.right}`;
            statusEl.textContent = `Saque da Geleia ${server === "left" ? "Rosa" : "Verde"}`;
        }

        function getSideLabel(side) {
            return side === "left" ? "Rosa" : "Verde";
        }

        function awardPoint(side) {
            if (roundOver) return;
            roundOver = true;
            rallyStarted = false;
            roundEndedAt = performance.now();
            touchState.side = null;
            touchState.count = 0;

            if (side === "left") {
                score.left += 1;
            } else {
                score.right += 1;
            }

            const nextServer = side;
            server = nextServer;
            positionPlayers();
            positionBall(nextServer);
            statusEl.textContent = `Ponto da Geleia ${side === "left" ? "Rosa" : "Verde"}!`;
            playCrowdCheer();
            setTimeout(() => {
                resetRally(nextServer);
            }, 900);
        }

        function updatePlayer(player, leftKey, rightKey, jumpKey) {
            let direction = 0;
            if (controls[leftKey]) direction -= 1;
            if (controls[rightKey]) direction += 1;

            player.vx += direction * player.speed;
            player.vx *= 0.9;
            player.vx = Math.max(-player.maxSpeed, Math.min(player.maxSpeed, player.vx));

            if (controls[jumpKey] && player.onGround) {
                player.vy = -player.jumpStrength;
                player.onGround = false;
            }

            player.vy += world.gravity;
            player.x += player.vx;
            player.y += player.vy;

            if (player.x - player.radius < player.sideMin) {
                player.x = player.sideMin + player.radius;
                player.vx *= -0.2;
            }

            if (player.x + player.radius > player.sideMax) {
                player.x = player.sideMax - player.radius;
                player.vx *= -0.2;
            }

            if (player.y > world.floorY) {
                player.y = world.floorY;
                player.vy = 0;
                player.onGround = true;
            }

            const stretchBase = Math.min(1.16, 1 + Math.abs(player.vy) * 0.015 + Math.abs(player.vx) * 0.01);
            player.squash += (stretchBase - player.squash) * 0.18;
        }

        function applyHitTrajectory(player, launchSpeed) {
            const maxAngle = 35 * (Math.PI / 180);
            const contactOffset = Math.max(-1, Math.min(1, (ball.x - player.x) / player.radius));
            const angle = contactOffset * maxAngle;
            const speed = Math.abs(launchSpeed);

            ball.vx = Math.sin(angle) * speed;
            ball.vy = -Math.cos(angle) * speed;
        }

        function registerTouch(side) {
            if (touchState.side === side) {
                touchState.count += 1;
            } else {
                touchState.side = side;
                touchState.count = 1;
            }

            if (touchState.count > 3) {
                awardPoint(side === "left" ? "right" : "left");
                return false;
            }

            if (rallyStarted) {
                statusEl.textContent = `${getSideLabel(side)}: ${touchState.count}/3 toques`;
            }

            return true;
        }

        function resolveBallVsPlayer(player) {
            const dx = ball.x - player.x;
            const dy = ball.y - (player.y - 12);
            const distance = Math.hypot(dx, dy);
            const collisionDistance = ball.radius + player.radius;

            if (distance === 0 || distance >= collisionDistance) return false;

            const nx = dx / distance;
            const ny = dy / distance;
            const overlap = collisionDistance - distance;

            ball.x += nx * overlap;
            ball.y += ny * overlap;

            if (!rallyStarted) {
                if (!registerTouch(player.side)) return true;
                rallyStarted = true;
                applyHitTrajectory(player, 5.1);
                ball.spin = player.vx * 0.05;
                statusEl.textContent = `Bola em jogo`;
                return true;
            }

            if (!registerTouch(player.side)) return true;
            applyHitTrajectory(player, 11.9);
            ball.spin = player.vx * 0.06;
            return true;
        }

        function resolveBallVsWalls() {
            if (ball.x - ball.radius <= 0) {
                ball.x = ball.radius;
                ball.vx *= -1;
            }

            if (ball.x + ball.radius >= world.width) {
                ball.x = world.width - ball.radius;
                ball.vx *= -1;
            }

            if (ball.y - ball.radius <= 0) {
                ball.y = ball.radius;
                ball.vy *= -1;
            }

            const netLeft = world.net.x - world.net.width / 2;
            const netRight = world.net.x + world.net.width / 2;
            const netTop = world.net.y;
            const withinNetWidth = ball.x + ball.radius > netLeft && ball.x - ball.radius < netRight;

            const touchesNetHeight = ball.y + ball.radius > netTop;

            if (ball.y - ball.radius < netTop && ball.y + ball.radius > netTop && withinNetWidth && ball.vy > 0) {
                ball.y = netTop - ball.radius;
                ball.vy *= -1;
            } else if (touchesNetHeight && withinNetWidth) {
                if (ball.x < world.net.x) {
                    ball.x = netLeft - ball.radius;
                } else {
                    ball.x = netRight + ball.radius;
                }

                ball.vx *= -1;
            }
        }

        function updateBall() {
            if (!rallyStarted) {
                resolveBallVsPlayer(players.left);
                resolveBallVsPlayer(players.right);
                return;
            }

            ball.vy += world.gravity;
            ball.x += ball.vx;
            ball.y += ball.vy;
            ball.spin *= 0.995;

            resolveBallVsWalls();
            resolveBallVsPlayer(players.left);
            resolveBallVsPlayer(players.right);

            if (!roundOver && ball.y + ball.radius >= world.floorY) {
                ball.y = world.floorY - ball.radius;
                if (ball.x < world.net.x) {
                    awardPoint("right");
                } else {
                    awardPoint("left");
                }
            }
        }

        function drawBackground() {
            ctx.clearRect(0, 0, world.width, world.height);

            ctx.fillStyle = "#ffffff55";
            ctx.beginPath();
            ctx.arc(130, 90, 44, 0, Math.PI * 2);
            ctx.arc(172, 90, 36, 0, Math.PI * 2);
            ctx.arc(98, 102, 28, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(740, 100, 54, 0, Math.PI * 2);
            ctx.arc(796, 102, 38, 0, Math.PI * 2);
            ctx.arc(700, 116, 30, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#f4b266";
            ctx.fillRect(0, world.floorY, world.width, world.height - world.floorY);

            ctx.fillStyle = "#dd9347";
            ctx.fillRect(0, world.floorY, world.width, 10);

            ctx.strokeStyle = "#fff7df";
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(40, world.floorY);
            ctx.lineTo(world.width - 40, world.floorY);
            ctx.stroke();
        }

        function drawNet() {
            const { x, y, width, height } = world.net;

            ctx.fillStyle = "#4776b6";
            ctx.fillRect(x - width / 2 - 4, y - 12, 4, height + 12);
            ctx.fillRect(x + width / 2, y - 12, 4, height + 12);

            ctx.fillStyle = "#f8f8f8";
            ctx.fillRect(x - width / 2, y, width, height);

            ctx.strokeStyle = "#dce6f2";
            ctx.lineWidth = 1.2;
            for (let row = y + 6; row < y + height; row += 12) {
                ctx.beginPath();
                ctx.moveTo(x - width / 2, row);
                ctx.lineTo(x + width / 2, row);
                ctx.stroke();
            }
        }

        function drawPlayer(player) {
            const startled = !player.onGround;

            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.scale(1 / player.squash, player.squash);

            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(0, -8, player.radius, Math.PI, 0);
            ctx.lineTo(player.radius, 0);
            ctx.quadraticCurveTo(0, 26, -player.radius, 0);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(-14, -18, 8, 0, Math.PI * 2);
            ctx.arc(10, -18, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#17324d";
            ctx.beginPath();
            if (startled) {
                ctx.arc(-12, -17, 2.2, 0, Math.PI * 2);
                ctx.arc(12, -17, 2.2, 0, Math.PI * 2);
            } else {
                ctx.arc(-12, -17, 3.5, 0, Math.PI * 2);
                ctx.arc(12, -17, 3.5, 0, Math.PI * 2);
            }
            ctx.fill();

            ctx.strokeStyle = "#17324d";
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            if (startled) {
                ctx.arc(0, -5, 6, 0, Math.PI * 2);
                ctx.stroke();
            } else {
                ctx.arc(0, -3, 12, 0.15 * Math.PI, 0.85 * Math.PI);
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawBall() {
            ctx.save();
            ctx.translate(ball.x, ball.y);
            ctx.rotate(ball.spin);

            ctx.fillStyle = "#fff7e2";
            ctx.beginPath();
            ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = "#ffb347";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, ball.radius - 4, -0.3, 1.2);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, 0, ball.radius - 4, 2.1, 3.6);
            ctx.stroke();

            ctx.restore();
        }

        function gameLoop(now) {
            const settling = now - roundEndedAt < 850;

            if (!settling) {
                updatePlayer(players.left, "KeyA", "KeyD", "KeyW");
                updatePlayer(players.right, "ArrowLeft", "ArrowRight", "ArrowUp");
                updateBall();
            } else {
                positionPlayers();
            }

            drawBackground();
            drawNet();
            drawPlayer(players.left);
            drawPlayer(players.right);
            drawBall();

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener("keydown", (event) => {
            unlockAudio();
            if (event.code in controls) {
                controls[event.code] = true;
                event.preventDefault();
            }
        });

        window.addEventListener("keyup", (event) => {
            if (event.code in controls) {
                controls[event.code] = false;
                event.preventDefault();
            }
        });

        resetRally(server);
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
